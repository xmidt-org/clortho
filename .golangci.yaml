---
version: "2"
linters:
  enable:
    - bodyclose
    - dupl
    - errorlint
    - funlen
    - goconst
    - gosec
    - misspell
    - unconvert
    - prealloc
  disable:
    - errcheck
    - ineffassign
  settings:
    misspell:
      locale: US
    errorlint:
      # Report non-wrapping error creation using fmt.Errorf
      errorf: false
    gosec:
      excludes:
        # don't check math/rand vs crypto/rand
        - G404
    staticcheck:
      checks:
        - '-ST1005'
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - funlen
          - unused
        path: _test.go
